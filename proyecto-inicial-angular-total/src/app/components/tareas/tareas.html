@if (estaAgregandoNuevaTarea) {
  <app-nueva-tarea
    (cancelarTarea)="cancelarTareaNueva()"
    (agregarTarea)="alAgregarTarea($event)"
  />
}
<section id="tareas">
  <header>
    <h2>Tareas de {{ nombre }}</h2>
    <menu>
      <button (click)="crearTareaNueva()" )>Agregar tarea nueva</button>
    </menu>
  </header>
  <ul>
    @for (tarea of tareasUsuarioSeleccionado; track tarea.id) {
      <li>
        <app-tarea
          [tarea]="tarea"
          (terminada)="alCompletarTarea($event)"
        />
      </li>
    }
  </ul>
</section>
